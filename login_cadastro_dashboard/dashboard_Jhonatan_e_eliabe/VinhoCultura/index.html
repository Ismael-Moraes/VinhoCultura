<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard VinhoCultura</title>
</head>

<body>
    <header class="header">
        <div class="logo-area">
            <img src="SomenteLogo.png" alt="Logo VinhoCultura" class="logo">
            <h1>VinhoCultura</h1>
        </div>
        <nav class="menu">
            <a href="#">Vinhos</a>
            <a href="#">Clientes</a>
            <a href="#">Pedidos</a>
            <a href="#">Dashboard</a>  
        </nav>
    </header>

    <div class="dashboard">
        <div class="cards">
            <div class="card">
                <h3>Vendas Hoje</h3>
                <p>R$ 12.450</p>
            </div>
            <div class="card">
                <h3>Clientes</h3>
                <p>1.284</p>
            </div>
            <div class="card">
                <h3>Pedidos</h3>
                <p>326</p>
            </div>
            <div class="card">
                <h3>Estoque</h3>
                <p>842</p>
            </div>
        </div>

        <div class="middle">
            <div class="chart">
                <h2>Vendas Mensais</h2>
                <div class="charts-bars">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>

            <div class="orders">
                <h2>Últimos Pedidos</h2>
                <ul>
                    <li> Cabernet Sauvignon</li>
                    <li> Chardonnay Reserva</li>
                    <li> Merlot Premium</li>
                    <li> Pinot Noir</li>
                    <li> Espumante Brut</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
