<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mar de Vinho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <img src="SomenteLogo.png" alt="Logo" class="logo">
        <div class="menu">
            <a href="#">Início</a>
            <a href="#">Vendas</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </div>
    </div>

    <div class="cards">
        <div class="card">
            <h3>Vendas</h3>
            <p>150</p>
        </div>
        <div class="card">
            <h3>Clientes</h3>
            <p>89</p>
        </div>
        <div class="card">
            <h3>Produtos</h3>
            <p>45</p>
        </div>
        <div class="card">
            <h3>Pedidos</h3>
            <p>32</p>
        </div>
    </div>
    <div class="middle">
        <div class="chart">
            <h2>Vendas Mensais</h2>
            <div class="charts-bars">
                <div class="bar bar1"></div>
                <div class="bar bar2"></div>
                <div class="bar bar3"></div>
                <div class="bar bar4"></div>
                <div class="bar bar5"></div>
                <div class="bar bar6"></div>
                <div class="bar bar7"></div>
                <div class="bar bar8"></div>
                <div class="bar bar9"></div>
            </div>
        </div>
        <div class="orders">
            <h2>Últimos Pedidos</h2>
            <ul>
                <li>Pedido #001</li>
                <li>Pedido #002</li>
                <li>Pedido #003</li>
                <li>Pedido #004</li>
                <li>Pedido #005</li>
            </ul>
        </div>

    </div>
    <div class="clear"></div>
</body>
</html>
